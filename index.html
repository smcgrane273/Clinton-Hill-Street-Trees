<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clinton Hill Tree Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-frame">
    <header class="top-bar">
      <div class="top-bar-spacer" aria-hidden="true"></div>
      <div class="top-bar-center">
        <p class="top-kicker">CLINTON HILL TREE MAP</p>
        <h1>CLINTON HILL, BROOKLYN</h1>
      </div>
      <div class="top-bar-spacer" aria-hidden="true"></div>
    </header>

    <nav class="filter-bar" aria-label="Tree filters">
      <button class="filter-pill is-active">All</button>
      <button class="filter-pill">Health</button>
      <button class="filter-pill">Species</button>
      <button class="filter-pill">Size</button>
      <button class="filter-pill">Stewardship</button>
      <button class="filter-pill">Problems</button>
    </nav>

    <div class="content-shell">
      <section class="map-stage">
        <div id="map"></div>
      </section>

      <aside class="detail-panel" id="detail-panel">
        <p class="panel-label" id="panel-label">SELECTED TREE</p>
        <h2 class="panel-health" id="panel-health">No tree selected</h2>
        <h3 class="panel-species" id="panel-species">No tree selected</h3>
        <p class="panel-latin" id="panel-latin">Click a tree point to view its census details.</p>

        <dl class="panel-meta">
          <div><dt>Address</dt><dd id="panel-address">Click a tree point to view its census details.</dd></div>
          <div><dt>Diameter</dt><dd id="panel-dbh">—</dd></div>
          <div><dt>Sidewalk</dt><dd id="panel-sidewalk">—</dd></div>
          <div><dt>Stewardship</dt><dd id="panel-steward">—</dd></div>
          <div><dt>Problems</dt><dd id="panel-problems">—</dd></div>
          <div><dt>Status</dt><dd id="panel-status">—</dd></div>
          <div><dt>Tree ID</dt><dd id="panel-tree-id">—</dd></div>
          <div><dt>Updated</dt><dd id="panel-updated">—</dd></div>
        </dl>
      </aside>
    </div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="trees.js"></script>
  <script src="script.js"></script>
</body>
</html>
